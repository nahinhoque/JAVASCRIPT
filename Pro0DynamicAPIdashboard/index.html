<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Discovery</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900">User Discovery</h1>
            <p class="text-gray-600 mt-2">
                Fetch and search users from the free API
            </p>
        </div>

        <!-- Search -->
        <div class="mb-6 flex gap-3">
            <input type="text" placeholder="Search by name or email..." id="searchInput"
                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

            <button id="refreshBtn"
                class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition cursor-pointer">
                Refresh
            </button>
        </div>

        <p id="resultText" class="text-sm text-gray-600 mb-4 flex gap-2 items-center">
            <span class="relative flex size-3">
                <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-sky-400 opacity-75"></span>
                <span class="relative inline-flex size-3 rounded-full bg-sky-500"></span>
            </span>
            <span>Loading...</span>
        </p>




        <!-- Loading State -->
        <div id="loadingState" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="h-48 bg-gray-200 rounded-lg animate-pulse"></div>
            <div class="h-48 bg-gray-200 rounded-lg animate-pulse"></div>
            <div class="h-48 bg-gray-200 rounded-lg animate-pulse"></div>
            <div class="h-48 bg-gray-200 rounded-lg animate-pulse"></div>
            <div class="h-48 bg-gray-200 rounded-lg animate-pulse"></div>
            <div class="h-48 bg-gray-200 rounded-lg animate-pulse"></div>
            <div class="h-48 bg-gray-200 rounded-lg animate-pulse"></div>
            <div class="h-48 bg-gray-200 rounded-lg animate-pulse"></div>
        </div>

        <div id="userGrid" class=" grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden">



        </div>

        <div id="errorState" class="p-4 bg-red-100 text-red-700 rounded-lg hidden"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
